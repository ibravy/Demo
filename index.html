<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Nexus | Professional Chat</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #38bdf8; --text: #f1f5f9; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-card { width: 90%; max-width: 600px; height: 80vh; background: var(--panel); border-radius: 16px; display: flex; flex-direction: column; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid #334155; }
        .header { padding: 20px; border-bottom: 1px solid #334155; font-weight: bold; font-size: 1.2rem; color: var(--accent); }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 16px; border-radius: 12px; max-width: 80%; line-height: 1.5; font-size: 0.95rem; }
        .user { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #334155; border-bottom-left-radius: 2px; }
        .input-area { padding: 20px; display: flex; gap: 10px; background: rgba(15, 23, 42, 0.5); }
        input { flex: 1; background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 12px; color: white; outline: none; }
        input:focus { border-color: var(--accent); }
        button { background: var(--accent); color: #0f172a; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        .typing { font-size: 0.8rem; color: #94a3b8; margin-top: 5px; display: none; }
    </style>
</head>
<body>
    <div class="chat-card">
        <div class="header">AI NEXUS</div>
        <div id="chat-window">
            <div class="msg ai">Hello! How can I assist you today?</div>
        </div>
        <div id="status" class="typing" style="padding-left: 20px;">AI is thinking...</div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Send a message..." onkeypress="if(event.key==='Enter') askAI()">
            <button onclick="askAI()">Send</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
