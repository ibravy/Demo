<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Nexus | Local System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text-main: #f1f5f9; }
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { width: 95%; max-width: 800px; height: 85vh; background: var(--card); border-radius: 20px; display: flex; flex-direction: column; border: 1px solid #334155; overflow: hidden; }
        .header { padding: 20px; background: rgba(15, 23, 42, 0.5); border-bottom: 1px solid #334155; display: flex; justify-content: space-between; }
        #chat-window { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 0.95rem; line-height: 1.5; }
        .user-msg { align-self: flex-end; background: var(--accent); color: #0f172a; font-weight: 500; }
        .ai-msg { align-self: flex-start; background: #334155; color: var(--text-main); }
        .input-area { padding: 20px; background: rgba(15, 23, 42, 0.3); display: flex; gap: 12px; }
        input { flex: 1; background: #0f172a; border: 1px solid #475569; padding: 14px; border-radius: 10px; color: white; outline: none; }
        button { background: var(--accent); color: #0f172a; border: none; padding: 0 24px; border-radius: 10px; font-weight: 600; cursor: pointer; }
        #progress { font-size: 0.8rem; color: var(--accent); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span>AI NEXUS LOCAL</span>
            <span id="progress">Initializing engine...</span>
        </div>
        <div id="chat-window"><div class="message ai-msg">System Ready. (First run may take a moment to download the model).</div></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ask your local AI..." autocomplete="off">
            <button id="sendBtn">SEND</button>
        </div>
    </div>

    <!-- WebLLM engine for in-browser AI -->
    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        const chatWindow = document.getElementById('chat-window');
        const progressLabel = document.getElementById('progress');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        // Light model for 8GB RAM
        const selectedModel = "Llama-3.2-1B-Instruct-q4f16_1-MLC";
        const engine = new webllm.MLCEngine();

        engine.setInitProgressCallback((report) => {
            progressLabel.innerText = report.text;
        });

        async function handleChat() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, 'user-msg');
            userInput.value = '';
            const typingDiv = addMessage("Thinking...", 'ai-msg');

            try {
                // Ensure model is loaded
                await engine.reload(selectedModel);
                const messages = [{ role: "user", content: text }];
                const reply = await engine.chat.completions.create({ messages });
                typingDiv.innerText = reply.choices[0].message.content;
            } catch (e) {
                typingDiv.innerText = "Error: Local AI failed. Ensure your browser supports WebGPU.";
            }
        }

        function addMessage(text, className) {
            const div = document.createElement('div');
            div.className = `message ${className}`;
            div.innerText = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return div;
        }

        sendBtn.addEventListener('click', handleChat);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleChat(); });
    </script>
</body>
</html>
