<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet Roulette | Infinite Explorer</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #matrix-bg {
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.3;
        }

        .panel {
            background: rgba(0, 20, 0, 0.9);
            border: 2px solid #0f0;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 20px #0f0;
            max-width: 500px;
        }

        h1 {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 20px;
        }

        .btn-launch {
            background: #0f0;
            color: #000;
            border: none;
            padding: 15px 40px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-launch:hover {
            background: #000;
            color: #0f0;
            box-shadow: 0 0 15px #0f0;
        }

        .loading-text {
            margin-top: 20px;
            height: 20px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>

    <div class="panel">
        <h1>Global Site Crawler</h1>
        <p>Warning: You are about to exit the known web.</p>
        <button class="btn-launch" onclick="launch()">Initialize Jump</button>
        <div id="status" class="loading-text">READY FOR UPLOAD...</div>
    </div>

    <script>
        // Matrix Background Effect
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33);

        // Redirect Logic
        function launch() {
            const status = document.getElementById('status');
            status.innerText = "CALCULATING COORDINATES...";
            
            // This is a curated "Gateway" to millions of random sites
            const gateways = [
                "https://theuselessweb.com/",
                "https://www.randomwebsite.com/",
                "https://random-ize.com/random-website/",
                "https://discuvver.com/"
            ];

            setTimeout(() => {
                const choice = gateways[Math.floor(Math.random() * gateways.length)];
                window.location.href = choice;
            }, 1000);
        }
    </script>
</body>
</html>
