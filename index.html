<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio | Voice & Print</title>
    <style>
        :root {
            --gemini-purple: #8e24aa;
            --google-gray: #3c4043;
            --border: #dfe1e5;
        }

        body {
            font-family: 'Google Sans', Roboto, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            color: var(--google-gray);
        }

        .container {
            max-width: 850px;
            width: 100%;
            padding: 60px 20px;
        }

        /* Branding */
        .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .brand-icon { width: 24px; height: 24px; background: linear-gradient(45deg, #4285f4, #8e24aa); border-radius: 50%; }

        h1 { color: var(--gemini-purple); font-weight: 400; }

        /* Content Area */
        #printable-content {
            padding: 30px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: #ffffff;
            min-height: 200px;
            margin-bottom: 20px;
        }

        /* Controls - Hidden during Printing */
        .controls { display: flex; gap: 10px; margin-top: 20px; }
        
        button {
            padding: 12px 24px;
            border-radius: 24px;
            border: 1px solid var(--border);
            background: white;
            cursor: pointer;
            font-weight: 500;
        }

        button:hover { background: #f8f9fa; border-color: var(--gemini-purple); }

        /* PRINT STYLES: This hides the buttons when you print */
        @media print {
            .controls, .brand, .url-bar { display: none !important; }
            body { padding: 0; }
            #printable-content { border: none; padding: 0; }
            h1 { color: black; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="brand">
            <div class="brand-icon"></div>
            <strong>AI Studio</strong>
        </div>

        <h1>AI Output Terminal</h1>
        
        <div id="printable-content">
            <p><em>Click "Start Listening" to speak, then "Print" to save this text...</em></p>
            <!-- AI or Voice text will appear here -->
        </div>
        
        <div class="controls">
            <button onclick="startListening()">🎤 Start Listening</button>
            <button onclick="window.print()">🖨️ Print Page</button>
        </div>
    </div>

    <script>
        const content = document.getElementById('printable-content');

        // Simple Voice Recognition
        function startListening() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();

            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                // We add the text to the printable area
                content.innerHTML = `<h3>Voice Transcript</h3><p>${text}</p>`;
            };
            
            recognition.start();
        }
    </script>

</body>
</html>
