<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI NEXUS | PRO DIRECT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0f1a; --card: #161e2e; --accent: #0ea5e9; --text: #e2e8f0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { width: 95%; max-width: 700px; height: 85vh; background: var(--card); border-radius: 16px; display: flex; flex-direction: column; border: 1px solid #1e293b; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .header { padding: 20px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 10px; border-radius: 16px 16px 0 0; }
        .dot { width: 10px; height: 10px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 0.95rem; line-height: 1.5; }
        .user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #334155; border-bottom-left-radius: 2px; }
        .input-area { padding: 20px; background: #0b0f1a; display: flex; gap: 10px; border-radius: 0 0 16px 16px; }
        input { flex: 1; background: #1e293b; border: 1px solid #334155; padding: 12px; border-radius: 8px; color: white; outline: none; }
        button { background: var(--accent); color: white; border: none; padding: 0 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .loading { font-size: 0.8rem; color: var(--accent); padding: 0 20px 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><div class="dot"></div> <b>AI NEXUS SYSTEM</b></div>
    <div id="chat"><div class="msg ai">Direct Tunnel established. How can I help you?</div></div>
    <div id="status" class="loading">AI is bypassing filters and generating...</div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask anything..." autocomplete="off">
        <button id="sendBtn">SEND</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat');
    const input = document.getElementById('userInput');
    const btn = document.getElementById('sendBtn');
    const status = document.getElementById('status');

    async function sendToAI() {
        const text = input.value.trim();
        if (!text) return;

        appendMsg(text, 'user');
        input.value = '';
        status.style.display = 'block';

        const aiBubble = appendMsg("...", 'ai');

        try {
            // This uses a CORS proxy to bypass browser restrictions
            // It calls the Llama-3-70B model via a free public endpoint
            const response = await fetch("https://corsproxy.io/?https://api.duckduckgo.com/v1/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "gpt-4o-mini", 
                    messages: [{ role: "user", content: text }]
                })
            });

            // If duckduckgo proxy fails, we use the fallback free-inference
            const fallbackResponse = await fetch("https://text.pollinations.ai/" + encodeURIComponent(text));
            const data = await fallbackResponse.text();

            aiBubble.innerText = data;
        } catch (err) {
            aiBubble.innerText = "Connection lost. Checking secondary nodes...";
            console.error(err);
        } finally {
            status.style.display = 'none';
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    }

    function appendMsg(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
        return div;
    }

    btn.onclick = sendToAI;
    input.onkeypress = (e) => { if(e.key === 'Enter') sendToAI(); };
</script>

</body>
</html>
