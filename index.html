<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio | Gemini Style</title>
    <style>
        :root {
            --gemini-purple: #8e24aa;
            --google-gray: #3c4043;
            --light-gray: #70757a;
            --border: #dfe1e5;
            --bg-input: #f0f4f9;
        }

        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-color: #ffffff;
        }

        /* Header */
        .header {
            width: 100%;
            max-width: 900px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand { display: flex; align-items: center; gap: 10px; font-weight: 500; font-size: 1.2rem; }
        .brand-icon { width: 22px; height: 22px; background: linear-gradient(45deg, #4285f4, #8e24aa); border-radius: 50%; }

        /* Chat Display */
        #chat-window {
            flex: 1;
            width: 100%;
            max-width: 750px;
            padding: 20px;
            overflow-y: auto;
            margin-bottom: 120px;
        }

        .message { margin-bottom: 30px; line-height: 1.6; font-size: 1rem; }
        .user-label { font-weight: 600; color: var(--google-gray); margin-bottom: 4px; }
        .ai-label { font-weight: 600; color: var(--gemini-purple); margin-bottom: 4px; }

        /* Input Bar (Gemini Style) */
        .input-area {
            position: fixed;
            bottom: 30px;
            width: 90%;
            max-width: 700px;
            background: var(--bg-input);
            border-radius: 32px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            padding: 12px;
            font-size: 1rem;
        }

        .btn-group { display: flex; gap: 15px; padding-left: 10px; }
        .action-btn { background: none; border: none; cursor: pointer; font-size: 1.3rem; color: var(--light-gray); transition: 0.2s; }
        .action-btn:hover { color: var(--gemini-purple); }

        /* Print Settings */
        @media print {
            .input-area, .header, .action-btn { display: none !important; }
            #chat-window { margin: 0; padding: 0; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand">
            <div class="brand-icon"></div>
            <span>AI Studio</span>
        </div>
        <button class="action-btn" onclick="window.print()" title="Print Chat">🖨️</button>
    </div>

    <div id="chat-window">
        <div class="message">
            <div class="ai-label">AI Studio</div>
            <div>Hello! I am an AI assistant. Type below and I'll give you an answer.</div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Ask anything..." onkeypress="if(event.key==='Enter') askAI()">
        <div class="btn-group">
            <button class="action-btn" onclick="askAI()">➤</button>
        </div>
    </div>

    <script>
        // Get a FREE token from https://huggingface.co/settings/tokens
        const API_TOKEN = "hf_YOUR_TOKEN_HERE"; 
        
        async function askAI() {
            const inputField = document.getElementById('user-input');
            const chatWindow = document.getElementById('chat-window');
            const prompt = inputField.value.trim();

            if (!prompt) return;

            // 1. Add User Message
            addMessage("You", prompt, 'user-label');
            inputField.value = "";

            // 2. Add Loading State
            const loadingDiv = addMessage("AI Studio", "Processing...", 'ai-label');

            try {
                // 3. Call Hugging Face Inference API
                const response = await fetch("https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2", {
                    headers: { Authorization: `Bearer ${API_TOKEN}` },
                    method: "POST",
                    body: JSON.stringify({ inputs: prompt }),
                });

                const result = await response.json();
                
                // 4. Update with actual answer
                // Mistral returns an array with generated_text
                let aiText = result[0].generated_text || "I couldn't generate a response.";
                
                // Clean up: Remove the prompt from the response if the model includes it
                aiText = aiText.replace(prompt, "").trim();

                loadingDiv.innerHTML = `<div class="ai-label">AI Studio</div><div>${aiText.replace(/\n/g, '<br>')}</div>`;
            } catch (error) {
                loadingDiv.innerHTML = `<div class="ai-label">AI Studio</div><div style="color:red;">Error connecting to the AI model.</div>`;
            }

            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function addMessage(sender, text, labelClass) {
            const chatWindow = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `<div class="${labelClass}">${sender}</div><div>${text}</div>`;
            chatWindow.appendChild(div);
            return div;
        }
    </script>

</body>
</html>
