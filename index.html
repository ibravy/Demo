<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI NEXUS | DIRECT LOCAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f1f5f9; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { width: 95%; max-width: 800px; height: 85vh; background: var(--card); border-radius: 20px; display: flex; flex-direction: column; border: 1px solid #334155; }
        .header { padding: 20px; background: rgba(15, 23, 42, 0.5); border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        #chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 15px; line-height: 1.5; font-size: 0.95rem; }
        .user { align-self: flex-end; background: var(--accent); color: #0f172a; font-weight: 600; }
        .ai { align-self: flex-start; background: #334155; }
        .input-box { padding: 20px; display: flex; gap: 10px; background: #0f172a; }
        input { flex: 1; background: transparent; border: 1px solid #475569; padding: 12px; border-radius: 10px; color: white; outline: none; }
        button { background: var(--accent); color: #0f172a; border: none; padding: 0 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #status { font-size: 0.75rem; color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span>AI NEXUS (Direct Llama)</span>
        <span id="status">Engine: Ready</span>
    </div>
    <div id="chat"><div class="msg ai">I am running 100% locally on your machine. Type a message to begin!</div></div>
    <div class="input-box">
        <input type="text" id="prompt" placeholder="Ask anything..." autocomplete="off">
        <button id="sendBtn">SEND</button>
    </div>
</div>

<script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    const chatContainer = document.getElementById('chat');
    const statusLabel = document.getElementById('status');
    const userInput = document.getElementById('prompt');
    const sendBtn = document.getElementById('sendBtn');

    // Lightest "Real AI" model for 8GB RAM
    const modelId = "Llama-3.2-1B-Instruct-q4f16_1-MLC";
    let engine;

    // Load AI Engine
    async function initAI() {
        if (engine) return;
        statusLabel.innerText = "Engine: Loading Model...";
        engine = new webllm.MLCEngine();
        engine.setInitProgressCallback((report) => {
            statusLabel.innerText = report.text.split(']')[1] || "Downloading...";
        });
        await engine.reload(modelId);
        statusLabel.innerText = "Engine: Online";
    }

    async function send() {
        const text = userInput.value.trim();
        if (!text) return;

        // Display User Message
        appendMessage(text, 'user');
        userInput.value = '';
        
        const aiBubble = appendMessage("...", 'ai');
        
        try {
            await initAI();
            const messages = [{ role: "user", content: text }];
            const chunks = await engine.chat.completions.create({ messages, stream: true });
            
            let fullReply = "";
            for await (const chunk of chunks) {
                const content = chunk.choices[0]?.delta?.content || "";
                fullReply += content;
                aiBubble.innerText = fullReply; // Real-time streaming
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        } catch (err) {
            aiBubble.innerText = "Error: Your browser might not support WebGPU.";
            console.error(err);
        }
    }

    function appendMessage(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return div;
    }

    sendBtn.onclick = send;
    userInput.onkeypress = (e) => { if(e.key === 'Enter') send(); };
</script>

</body>
</html>
