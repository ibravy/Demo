<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problem Solver AI</title>
    <style>
        /* CSS STYLING */
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: #1e293b;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 650px;
            text-align: center;
            border: 1px solid #334155;
        }

        h1 { margin-top: 0; color: #3b82f6; }

        .badge {
            font-size: 0.4em;
            background: #3b82f6;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            vertical-align: middle;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: #0f172a;
            border: 1px solid #3b82f6;
            color: #e2e8f0;
            padding: 15px;
            border-radius: 10px;
            resize: none;
            font-size: 1rem;
            box-sizing: border-box;
            margin: 20px 0;
            outline: none;
        }

        textarea:focus {
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.5);
        }

        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s ease;
            width: 100%;
        }

        button:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        .hidden { display: none; }

        #solutionArea {
            text-align: left;
            background: #0f172a;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            border-left: 4px solid #3b82f6;
        }

        .reset-btn {
            background: transparent;
            border: 1px solid #475569;
            margin-top: 15px;
        }

        .reset-btn:hover {
            background: #334155;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Problem Solver <span class="badge">Engine</span></h1>
        <p>Input your technical challenge for a structured solution path.</p>
        
        <div id="inputSection">
            <textarea id="problemInput" placeholder="e.g., My Python script is returning a 'NoneType' error when fetching API data..."></textarea>
            <button onclick="solve()">Analyze & Solve</button>
        </div>

        <div id="loader" class="hidden">
            <div class="spinner"></div>
            <p>Running diagnostics...</p>
        </div>

        <div id="solutionArea" class="hidden">
            <h3 style="color: #60a5fa; margin-top: 0;">Diagnostic Result:</h3>
            <div id="resultText"></div>
            <button onclick="reset()" class="reset-btn">New Analysis</button>
        </div>
    </div>

    <script>
        /* JAVASCRIPT LOGIC */
        function solve() {
            const input = document.getElementById('problemInput').value.trim();
            
            if (input.length < 5) {
                alert("Please describe the problem in more detail.");
                return;
            }

            document.getElementById('inputSection').classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');

            // Simulate "thinking" time
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('solutionArea').classList.remove('hidden');
                
                const resultText = document.getElementById('resultText');
                resultText.innerHTML = generateLogic(input);
            }, 1800);
        }

        function generateLogic(text) {
            const query = text.toLowerCase();
            
            // Logic keywords for specific categories
            if (query.includes("code") || query.includes("error") || query.includes("script")) {
                return `
                    <p><strong>Initial Check:</strong> Verify syntax and indentation in your environment.</p>
                    <p><strong>Path A:</strong> Wrap the suspected block in a try/except block to catch the specific exception.</p>
                    <p><strong>Path B:</strong> Print the variables immediately before the error line to ensure they aren't 'null' or 'undefined'.</p>
                `;
            } else if (query.includes("slow") || query.includes("performance")) {
                return `
                    <p><strong>Bottleneck Found:</strong> Resource allocation seems suboptimal.</p>
                    <p><strong>Fix:</strong> Check for memory leaks or unclosed loops. Ensure hardware acceleration is enabled if applicable.</p>
                `;
            } else {
                return `
                    <p><strong>General Analysis:</strong> The problem is complex but solvable.</p>
                    <p><strong>Recommendation:</strong> Isolate the core variable. Test the system in segments to find where the logic breaks down. Documentation review is advised.</p>
                `;
            }
        }

        function reset() {
            document.getElementById('problemInput').value = "";
            document.getElementById('solutionArea').classList.add('hidden');
            document.getElementById('inputSection').classList.remove('hidden');
        }
    </script>
</body>
</html>
