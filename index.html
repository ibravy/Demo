<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetShield | Internet Trust Verifier</title>
    <style>
        :root {
            --primary: #00ff88;
            --bg: #0a0a0c;
            --card: #16161e;
            --text: #e1e1e6;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .shield-container {
            background: var(--card);
            border: 1px solid #2d2d3a;
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .status-light {
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px var(--primary);
        }

        h1 { font-size: 2rem; margin-bottom: 10px; letter-spacing: -1px; }
        
        .input-box {
            background: #0c0c10;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            color: white;
            margin: 20px 0;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .btn-scan {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .btn-scan:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        #result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            display: none;
            text-align: left;
            animation: fadeIn 0.5s ease;
        }

        .danger { border: 2px solid #ff4444; background: rgba(255, 68, 68, 0.1); }
        .safe { border: 2px solid #00ff88; background: rgba(0, 255, 136, 0.1); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .loader {
            display: none;
            border: 3px solid #333;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="shield-container">
    <div style="font-size: 0.8rem; color: #888; margin-bottom: 20px;">
        <span class="status-light"></span> NETWORK SECURE
    </div>
    <h1>NetShield AI</h1>
    <p style="color: #888;">Paste a link or message to verify its safety.</p>

    <input type="text" id="userInput" class="input-box" placeholder="https://... or 'You won a prize!'" />
    <button class="btn-scan" onclick="startScan()">RUN DEEP SCAN</button>

    <div id="loader" class="loader"></div>

    <div id="result">
        <h4 id="resTitle"></h4>
        <p id="resDesc" style="font-size: 0.9rem;"></p>
    </div>
</div>

<script>
    function startScan() {
        const input = document.getElementById('userInput').value;
        if(!input) return;

        const res = document.getElementById('result');
        const loader = document.getElementById('loader');
        
        res.style.display = 'none';
        loader.style.display = 'block';

        // Simulate AI analysis delay
        setTimeout(() => {
            loader.style.display = 'none';
            res.style.display = 'block';
            analyze(input);
        }, 1500);
    }

    function analyze(val) {
        const res = document.getElementById('result');
        const title = document.getElementById('resTitle');
        const desc = document.getElementById('resDesc');
        const low = val.toLowerCase();

        // SIMULATED THREAT DETECTION LOGIC
        if (low.includes('http') && !low.includes('s')) {
            res.className = 'danger';
            title.innerText = "🚨 CRITICAL VULNERABILITY";
            desc.innerText = "Non-encrypted (HTTP) link detected. High risk of data interception.";
        } else if (low.includes('win') || low.includes('prize') || low.includes('gift')) {
            res.className = 'danger';
            title.innerText = "⚠️ SOCIAL ENGINEERING DETECTED";
            desc.innerText = "Content matches common phishing patterns designed to steal credentials.";
        } else {
            res.className = 'safe';
            title.innerText = "✅ SOURCE VERIFIED";
            desc.innerText = "No immediate AI-fraud signatures detected. Proceed with standard caution.";
        }
    }
</script>

</body>
</html>
