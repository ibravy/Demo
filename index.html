<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ahmet's GPT Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-lg bg-gray-900 p-6 rounded-2xl border border-green-500 shadow-2xl">
        <h1 class="text-3xl font-bold text-green-500 mb-4 text-center">GPT SYSTEM ONLINE</h1>
        
        <div id="chat-box" class="h-80 overflow-y-auto mb-4 p-4 border border-gray-800 rounded-xl space-y-3 text-sm scroll-smooth">
            <div class="text-green-300">GPT Engine Connected. Ready for your command, Ahmet.</div>
        </div>

        <div class="flex gap-2">
            <input id="user-in" type="text" placeholder="Ask GPT anything..." 
                   class="flex-1 bg-gray-800 p-3 rounded-lg border border-gray-700 focus:outline-none focus:border-green-500">
            <button onclick="runGPT()" class="bg-green-600 px-6 py-3 rounded-lg font-bold hover:bg-green-500">SEND</button>
        </div>
    </div>

    <script>
        // STEP: Paste your OpenAI API Key here
        const OPENAI_KEY = "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"; 

        async function runGPT() {
            const box = document.getElementById('chat-box');
            const input = document.getElementById('user-in');
            const msg = input.value.trim();
            if(!msg) return;

            box.innerHTML += `<div class="text-right"><span class="bg-green-700 p-2 rounded-lg inline-block">${msg}</span></div>`;
            input.value = "";
            
            const tempId = "t-" + Date.now();
            box.innerHTML += `<div id="${tempId}" class="text-gray-500 italic">GPT is thinking...</div>`;
            box.scrollTop = box.scrollHeight;

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${OPENAI_KEY}`
                    },
                    body: JSON.stringify({
                        model: "gpt-4o-mini", // Fast and cheap version
                        messages: [{role: "user", content: msg}]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    document.getElementById(tempId).innerHTML = `<div class="text-red-500">Error: ${data.error.message}</div>`;
                } else {
                    const reply = data.choices[0].message.content;
                    document.getElementById(tempId).innerHTML = `<div class="text-gray-100 bg-gray-800 p-2 rounded-lg border border-gray-700">${reply}</div>`;
                }
            } catch (e) {
                document.getElementById(tempId).innerHTML = `<div class="text-red-500">Connection Failed. Check your OpenAI Key.</div>`;
            }
            box.scrollTop = box.scrollHeight;
        }

        document.getElementById("user-in").addEventListener("keypress", (e) => { if (e.key === "Enter") runGPT(); });
    </script>
</body>
</html>
