
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Studio</title>
    <style>
        :root {
            --gemini-purple: #8e24aa;
            --google-gray: #3c4043;
            --light-gray: #70757a;
            --border: #dfe1e5;
            --bg-input: #f0f4f9;
        }

        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-color: #ffffff;
        }

        /* Top Header */
        .header {
            width: 100%;
            max-width: 900px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand { display: flex; align-items: center; gap: 10px; font-weight: 500; font-size: 1.2rem; }
        .brand-icon { width: 22px; height: 22px; background: linear-gradient(45deg, #4285f4, #8e24aa); border-radius: 50%; }

        /* Chat Window */
        #chat-window {
            flex: 1;
            width: 100%;
            max-width: 750px;
            padding: 20px;
            overflow-y: auto;
            margin-bottom: 120px;
        }

        .message { margin-bottom: 30px; line-height: 1.6; font-size: 1rem; }
        .user-label { font-weight: 600; color: var(--google-gray); margin-bottom: 4px; }
        .ai-label { font-weight: 600; color: var(--gemini-purple); margin-bottom: 4px; }

        /* Input Bar */
        .input-area {
            position: fixed;
            bottom: 30px;
            width: 90%;
            max-width: 700px;
            background: var(--bg-input);
            border-radius: 32px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            padding: 12px;
            font-size: 1rem;
        }

        .btn-group { display: flex; gap: 15px; padding-left: 10px; }
        .action-btn { background: none; border: none; cursor: pointer; font-size: 1.3rem; color: var(--light-gray); transition: 0.2s; }
        .action-btn:hover { color: var(--gemini-purple); }

        /* Print formatting */
        @media print {
            .input-area, .header, .action-btn { display: none !important; }
            #chat-window { margin: 0; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand">
            <div class="brand-icon"></div>
            <span>Gemini Studio</span>
        </div>
        <button class="action-btn" onclick="window.print()" title="Print this chat">🖨️</button>
    </div>

    <div id="chat-window">
        <div class="message">
            <div class="ai-label">Gemini</div>
            <div>Hello! I am your AI assistant. Type a question below to get started.</div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Ask Gemini..." onkeypress="if(event.key==='Enter') askAI()">
        <div class="btn-group">
            <button class="action-btn" onclick="askAI()">➤</button>
        </div>
    </div>

    <script>
        // REPLACE THIS WITH YOUR KEY FROM https://aistudio.google.com/
        const API_KEY = "AIzaSyCjIr6LVMXEcQO_PWRkBnFtTLLBIXAhqwg"; 
      // Try changing your URL to this one:
const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        async function askAI() {
            const inputField = document.getElementById('user-input');
            const chatWindow = document.getElementById('chat-window');
            const prompt = inputField.value.trim();

            if (!prompt) return;

            // 1. Add User Message to screen
            addMessage("You", prompt, 'user-label');
            inputField.value = "";

            // 2. Prepare Loading Message
            const loadingDiv = addMessage("Gemini", "Thinking...", 'ai-label');

            try {
                // 3. Fetch Answer from Gemini API
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;

                // 4. Update the message with the real answer
                loadingDiv.innerHTML = `<div class="ai-label">Gemini</div><div>${aiText.replace(/\n/g, '<br>')}</div>`;
            } catch (error) {
                loadingDiv.innerHTML = `<div class="ai-label">Gemini</div><div style="color:red;">Error: Make sure your API key is correct.</div>`;
            }

            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function addMessage(sender, text, labelClass) {
            const chatWindow = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `<div class="${labelClass}">${sender}</div><div>${text}</div>`;
            chatWindow.appendChild(div);
            return div;
        }
    </script>

</body>
</html>
