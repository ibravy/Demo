<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ahmet AI System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #030303; color: white; font-family: sans-serif; }
        .glow-box {
            box-shadow: 0 0 50px rgba(59, 130, 246, 0.4);
            border: 1px solid rgba(59, 130, 246, 0.5);
        }
        .chat-scroll::-webkit-scrollbar { width: 5px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #1e40af; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="glow-box bg-gray-900 p-8 rounded-2xl text-center mb-8 w-full max-w-2xl">
        <h1 class="text-5xl font-bold mb-2 text-blue-500 tracking-tighter">AI SYSTEM ONLINE</h1>
        <p class="text-gray-400 text-sm">Authorized User: <span class="text-blue-300 font-bold">AHMET</span></p>
    </div>

    <div class="w-full max-w-2xl bg-gray-900/50 border border-gray-800 rounded-3xl flex flex-col h-[450px] backdrop-blur-xl shadow-2xl">
        
        <div id="chat-window" class="chat-scroll flex-1 p-6 overflow-y-auto space-y-4">
            <div class="bg-blue-600/10 p-3 rounded-2xl border border-blue-500/20 self-start max-w-[85%] text-blue-100">
                System initialized. I am your personal AI assistant. How can I help you today, Ahmet?
            </div>
        </div>

        <div class="p-4 bg-black/40 flex gap-3">
            <input id="user-input" type="text" placeholder="Send a command..." 
                   class="flex-1 bg-gray-800/50 border border-gray-700 rounded-2xl px-5 py-3 focus:outline-none focus:border-blue-500 text-white">
            <button onclick="sendMessage()" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-2xl font-bold transition-all active:scale-95">
                SEND
            </button>
        </div>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById('user-input');
            const window = document.getElementById('chat-window');
            
            if (input.value.trim() === "") return;

            // Show Ahmet's Message
            window.innerHTML += `
                <div class="flex justify-end">
                    <div class="bg-blue-600 p-3 rounded-2xl rounded-tr-none max-w-[85%] shadow-lg">
                        ${input.value}
                    </div>
                </div>`;
            
            // AI "Thinking" Response
            setTimeout(() => {
                window.innerHTML += `
                    <div class="flex justify-start">
                        <div class="bg-gray-800 p-3 rounded-2xl rounded-tl-none border border-gray-700 max-w-[85%] text-gray-300 italic">
                            Processing request... (Ready to connect to API)
                        </div>
                    </div>`;
                window.scrollTop = window.scrollHeight;
            }, 600);

            input.value = "";
            window.scrollTop = window.scrollHeight;
        }

        // Allow pressing "Enter" to send
        document.getElementById("user-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });
    </script>

</body>
</html>
