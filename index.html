<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Nexus | System Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text-main: #f1f5f9; }
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { width: 95%; max-width: 800px; height: 85vh; background: var(--card); border-radius: 20px; display: flex; flex-direction: column; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5); border: 1px solid #334155; overflow: hidden; }
        .header { padding: 20px; background: rgba(15, 23, 42, 0.5); border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 10px; }
        .status-dot { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 8px #22c55e; }
        #chat-window { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 0.95rem; line-height: 1.5; word-wrap: break-word; }
        .user-msg { align-self: flex-end; background: var(--accent); color: #0f172a; font-weight: 500; border-bottom-right-radius: 2px; }
        .ai-msg { align-self: flex-start; background: #334155; color: var(--text-main); border-bottom-left-radius: 2px; }
        .input-area { padding: 20px; background: rgba(15, 23, 42, 0.3); display: flex; gap: 12px; }
        input { flex: 1; background: #0f172a; border: 1px solid #475569; padding: 14px; border-radius: 10px; color: white; outline: none; }
        button { background: var(--accent); color: #0f172a; border: none; padding: 0 24px; border-radius: 10px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><div class="status-dot"></div><span>AI NEXUS SYSTEM</span></div>
        <div id="chat-window">
            <div class="message ai-msg">System Active. Please authorize the prompt if it appears.</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type your command..." autocomplete="off">
            <button id="sendBtn">SEND</button>
        </div>
    </div>

    <!-- API Library -->
    <script src="https://js.puter.com/v2/"></script>
    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        async function handleChat() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, 'user-msg');
            userInput.value = '';
            const typingDiv = addMessage("Thinking...", 'ai-msg');

            try {
                // This is the call that makes the AI work
                const response = await puter.ai.chat(text);
                typingDiv.innerText = response;
            } catch (error) {
                typingDiv.innerText = "Connection Error. Make sure to click 'Allow' if Puter asks for permission.";
            }
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function addMessage(text, className) {
            const div = document.createElement('div');
            div.className = `message ${className}`;
            div.innerText = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return div;
        }

        sendBtn.addEventListener('click', handleChat);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleChat(); });
    </script>
</body>
</html>
