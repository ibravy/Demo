<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ahmet's Real AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-xl bg-gray-900 p-8 rounded-3xl border border-blue-600 shadow-2xl">
        <h1 class="text-4xl font-black text-blue-500 mb-2 text-center italic">NEURAL LINK</h1>
        <p id="status" class="text-gray-500 text-center text-xs mb-6 uppercase tracking-widest">Loading Neural Engine...</p>

        <div id="chat-box" class="h-80 overflow-y-auto mb-6 p-4 bg-black/50 rounded-2xl border border-gray-800 space-y-4 text-sm">
            <div class="text-blue-300">System: Waiting for engine to warm up...</div>
        </div>

        <div class="flex gap-2">
            <input id="user-in" type="text" placeholder="Talk to the AI..." disabled
                   class="flex-1 bg-gray-800 p-4 rounded-xl border border-gray-700 focus:outline-none focus:border-blue-500 opacity-50">
            <button id="send-btn" onclick="askAI()" disabled class="bg-blue-600 px-6 rounded-xl font-bold opacity-50">SEND</button>
        </div>
    </div>

    <script type="module">
        // This is the real AI brain library
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

        let generator;
        const status = document.getElementById('status');
        const input = document.getElementById('user-in');
        const btn = document.getElementById('send-btn');

        async function initAI() {
            try {
                // Downloads a small but real GPT-style model
                generator = await pipeline('text-generation', 'Xenova/tiny-random-gpt2');
                status.innerText = "System Online • Real AI Active";
                input.disabled = false;
                input.classList.remove('opacity-50');
                btn.disabled = false;
                btn.classList.remove('opacity-50');
            } catch (e) {
                status.innerText = "Error: System failed to load.";
            }
        }

        window.askAI = async function() {
            const chat = document.getElementById('chat-box');
            const msg = input.value.trim();
            if(!msg) return;

            chat.innerHTML += `<div class="text-right"><span class="bg-blue-600 p-2 rounded-lg">${msg}</span></div>`;
            input.value = "";
            
            const id = "ai-" + Date.now();
            chat.innerHTML += `<div id="${id}" class="text-gray-500 italic">Thinking...</div>`;
            chat.scrollTop = chat.scrollHeight;

            // The AI actually "generates" a response here
            const output = await generator(msg, { max_new_tokens: 20, temperature: 0.7 });
            const response = output[0].generated_text;

            document.getElementById(id).innerHTML = `<div class="bg-gray-800 p-2 rounded-lg border border-gray-700">${response}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }

        initAI();
    </script>
</body>
</html>
