<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ahmet's Personal AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen flex flex-col items-center p-10">

    <h1 class="text-4xl font-bold text-blue-500 mb-8">AHMET AI CORE</h1>

    <div class="w-full max-w-2xl bg-gray-900 border border-blue-500 rounded-2xl flex flex-col h-[500px] overflow-hidden shadow-2xl">
        
        <div id="chat-window" class="flex-1 p-6 overflow-y-auto space-y-4">
            <div class="bg-blue-600/20 p-3 rounded-lg border border-blue-500/30 self-start max-w-[80%]">
                Hello! I am your personal AI. How can I help you today?
            </div>
        </div>

        <div class="p-4 border-t border-gray-800 bg-black flex gap-2">
            <input id="user-input" type="text" placeholder="Type a message..." class="flex-1 bg-gray-800 border border-gray-700 rounded-xl px-4 py-2 focus:outline-none focus:border-blue-500">
            <button onclick="sendMessage()" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-xl font-bold">Send</button>
        </div>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById('user-input');
            const window = document.getElementById('chat-window');
            
            if (input.value.trim() === "") return;

            // Add User Message
            window.innerHTML += `<div class="bg-gray-700 p-3 rounded-lg self-end max-w-[80%] ml-auto">${input.value}</div>`;
            
            // AI Response (Simple logic for now)
            setTimeout(() => {
                window.innerHTML += `<div class="bg-blue-600/20 p-3 rounded-lg border border-blue-500/30 self-start max-w-[80%] italic text-blue-300">I am thinking... (Connect an API key to get real answers!)</div>`;
                window.scrollTop = window.scrollHeight;
            }, 500);

            input.value = "";
            window.scrollTop = window.scrollHeight;
        }
    </script>

</body>
</html>
