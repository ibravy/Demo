<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ahmet's Real AI Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #030303; color: white; font-family: 'Inter', sans-serif; }
        .glow-box {
            box-shadow: 0 0 50px rgba(59, 130, 246, 0.4);
            border: 1px solid rgba(59, 130, 246, 0.5);
        }
        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: #2563eb; border-radius: 10px; }
        .loading-bar { height: 2px; background: #2563eb; width: 0%; transition: width 0.3s; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div class="glow-box bg-gray-900/80 p-10 rounded-2xl text-center mb-8 w-full max-w-2xl backdrop-blur-md">
        <h1 class="text-5xl font-bold mb-3 text-blue-500 tracking-tight">AI SYSTEM ONLINE</h1>
        <p id="status-text" class="text-gray-400 text-sm tracking-wide">Initializing Neural Engine...</p>
        <div class="mt-4 w-full bg-gray-800 rounded-full overflow-hidden">
            <div id="progress-bar" class="loading-bar"></div>
        </div>
    </div>

    <div class="w-full max-w-2xl bg-[#0a0a0a] border border-gray-800 rounded-3xl flex flex-col h-[450px] shadow-2xl overflow-hidden">
        <div id="chat-window" class="chat-scroll flex-1 p-6 overflow-y-auto space-y-4 text-sm">
            <div class="flex justify-start">
                <div class="bg-blue-600/10 border border-blue-500/20 p-3 rounded-2xl rounded-tl-none max-w-[80%] text-blue-100">
                    System ready. I am a local Transformer model. I can actually think now, Ahmet.
                </div>
            </div>
        </div>

        <div class="p-4 bg-black/50 border-t border-gray-800 flex gap-3">
            <input id="user-input" type="text" placeholder="Enter command..." disabled
                   class="flex-1 bg-gray-900 border border-gray-700 rounded-xl px-4 py-2 focus:outline-none focus:border-blue-500 disabled:opacity-50">
            <button id="send-btn" onclick="sendMessage()" disabled class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-2 rounded-xl font-bold transition-all disabled:opacity-50">
                SEND
            </button>
        </div>
    </div>

    <script type="module">
        // Import the real AI library
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

        let generator;
        const statusText = document.getElementById('status-text');
        const progressBar = document.getElementById('progress-bar');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // Load the AI model (This is a small but real text generator)
        async function initAI() {
            try {
                statusText.innerText = "Downloading AI Brain (Wait a moment)...";
                progressBar.style.width = "50%";
                
                // Using a very small model so it doesn't crash the browser
                generator = await pipeline('text-generation', 'Xenova/tiny-random-gpt2');
                
                statusText.innerText = "Neural Engine Active";
                progressBar.style.width = "100%";
                userInput.disabled = false;
                sendBtn.disabled = false;
            } catch (e) {
                statusText.innerText = "Error loading AI. Try refreshing.";
                console.error(e);
            }
        }

        window.sendMessage = async function() {
            const window = document.getElementById('chat-window');
            const text = userInput.value;
            if (!text) return;

            // Show User Message
            window.innerHTML += `<div class="flex justify-end"><div class="bg-blue-600 p-3 rounded-2xl rounded-tr-none max-w-[80%]">${text}</div></div>`;
            userInput.value = "";
            window.scrollTop = window.scrollHeight;

            // Real AI Thinking
            const thinkingDiv = document.createElement('div');
            thinkingDiv.className = "flex justify-start";
            thinkingDiv.innerHTML = `<div class="bg-gray-800 p-3 rounded-2xl rounded-tl-none border border-gray-700 max-w-[80%] text-gray-400 italic">Thinking...</div>`;
            window.appendChild(thinkingDiv);

            const output = await generator(text, { max_new_tokens: 20, temperature: 0.7 });
            
            // Show Real AI Response
            thinkingDiv.innerHTML = `<div class="bg-gray-800 p-3 rounded-2xl rounded-tl-none border border-gray-700 max-w-[80%] text-gray-200">${output[0].generated_text}</div>`;
            window.scrollTop = window.scrollHeight;
        }

        initAI();
    </script>
</body>
</html>
