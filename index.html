<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI NEXUS | PRO SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f1f5f9; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { width: 95%; max-width: 800px; height: 85vh; background: var(--card); border-radius: 20px; display: flex; flex-direction: column; border: 1px solid #334155; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .header { padding: 20px; background: rgba(15, 23, 42, 0.5); border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 10px; font-weight: 600; color: var(--accent); }
        .dot { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 10px #22c55e; }
        #chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 15px; line-height: 1.5; font-size: 0.95rem; }
        .user { align-self: flex-end; background: var(--accent); color: #0f172a; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #334155; border-bottom-left-radius: 2px; }
        .input-box { padding: 20px; display: flex; gap: 10px; background: #0f172a; }
        input { flex: 1; background: transparent; border: 1px solid #475569; padding: 12px; border-radius: 10px; color: white; outline: none; }
        input:focus { border-color: var(--accent); }
        button { background: var(--accent); color: #0f172a; border: none; padding: 0 25px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .loader { font-size: 0.8rem; color: #94a3b8; padding: 0 20px 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><div class="dot"></div> SYSTEM ONLINE (V4.1)</div>
    <div id="chat"><div class="msg ai">Hello. I am the real AI system. How can I assist you?</div></div>
    <div id="loading" class="loader">AI is generating response...</div>
    <div class="input-box">
        <input type="text" id="prompt" placeholder="Send a message..." onkeypress="if(event.key==='Enter') send()">
        <button onclick="send()">SEND</button>
    </div>
</div>

<script src="https://js.puter.com/v2/"></script>
<script>
    async function send() {
        const input = document.getElementById('prompt');
        const chat = document.getElementById('chat');
        const loader = document.getElementById('loading');
        const text = input.value.trim();

        if (!text) return;

        // 1. Add User Message
        chat.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = '';
        loader.style.display = 'block';
        chat.scrollTop = chat.scrollHeight;

        try {
            // 2. Call the REAL AI (GPT-4.1)
            // We use puter.ai.chat which is direct and reliable in 2026
            const response = await puter.ai.chat(text, { model: 'gpt-4.1-nano' });
            
            // 3. Display REAL response
            chat.innerHTML += `<div class="msg ai">${response}</div>`;
        } catch (err) {
            chat.innerHTML += `<div class="msg ai" style="color:#f87171">Connection Sync Error. Please refresh.</div>`;
        } finally {
            loader.style.display = 'none';
            chat.scrollTop = chat.scrollHeight;
        }
    }
</script>

</body>
</html>
