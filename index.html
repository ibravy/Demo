<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الذكاء الاصطناعي - أحمد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glow-border { border: 1px solid #1d4ed8; box-shadow: 0 0 20px rgba(29, 78, 216, 0.3); }
        .chat-area::-webkit-scrollbar { width: 5px; }
        .chat-area::-webkit-scrollbar-thumb { background: #1d4ed8; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="glow-border bg-gray-900/90 p-6 rounded-2xl text-center mb-6 w-full max-w-xl">
        <h1 class="text-3xl font-bold text-blue-500 uppercase">النظام العصبي الذكي</h1>
        <p class="text-gray-500 text-xs mt-2">يعمل للجميع • بدون مفتاح API</p>
    </div>

    <div class="w-full max-w-xl bg-gray-900 rounded-3xl border border-gray-800 flex flex-col h-[500px] shadow-2xl overflow-hidden">
        <div id="chat-window" class="chat-area flex-1 p-6 overflow-y-auto space-y-4 text-sm text-right">
            <div class="bg-blue-600/10 border border-blue-500/20 p-3 rounded-2xl rounded-tr-none text-blue-100">
                مرحباً بك. النظام مفعل وجاهز للإجابة على الجميع. يمكنني مساعدتك في البرمجة، تداول العملات، أو استراتيجيات يوتيوب.
            </div>
        </div>

        <div class="p-4 bg-black border-t border-gray-800 flex gap-2">
            <button onclick="askAI()" class="bg-blue-600 hover:bg-blue-500 px-6 py-3 rounded-xl font-bold transition-all active:scale-95">
                إرسال
            </button>
            <input id="user-input" type="text" placeholder="اسأل الذكاء الاصطناعي..." 
                   class="flex-1 bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 text-white text-right">
        </div>
    </div>

    <script>
        // قاعدة البيانات المعرفية الذكية (Smart Knowledge Base)
        const knowledge = [
            { keys: ["crypto", "btc", "تداول", "عملات", "binance"], ans: "تحليل السوق: راقب مستويات الدعم لـ BTC و SOL على منصة Binance. استخدم رافعة مالية منخفضة وراقب مؤشر RSI قبل الدخول." },
            { keys: ["python", "برمجة", "كود", "script"], ans: "منطق البرمجة: بايثون هي الأفضل لبناء التطبيقات. يمكنك استخدام مكتبة Tkinter للواجهات أو CCXT لربط منصات التداول." },
            { keys: ["youtube", "shorts", "يوتيوب", "قطط", "viral"], ans: "نمو القناة: فيديوهات القطط تحتاج إلى 'Hook' قوي في أول ثانيتين. استخدم أصواتاً رائجة لزيادة المشاهدات والوصول لـ 100 مشترك بسرعة." },
            { keys: ["roblox", "lua", "روبلوكس"], ans: "تطوير الألعاب: استخدم لغة Lua لبرمجة نقاط الحفظ (Checkpoints) في Roblox Studio. يمكنني تزويدك بكود النقاط إذا أردت." },
            { keys: ["سلام", "مرحبا", "هلا", "hi"], ans: "أهلاً بك! النظام يعمل بكامل طاقته وجاهز لمساعدتك في مشاريعك البرمجية والتقنية." }
        ];

        function askAI() {
            const input = document.getElementById('user-input');
            const chat = document.getElementById('chat-window');
            const text = input.value.trim().toLowerCase();

            if (!text) return;

            // رسالة المستخدم
            chat.innerHTML += `<div class="flex justify-start"><div class="bg-blue-600 p-3 rounded-2xl rounded-tl-none max-w-[85%]">${input.value}</div></div>`;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;

            // معالجة الذكاء الاصطناعي
            setTimeout(() => {
                let response = "لقد قمت بتحليل طلبك. للحصول على أفضل النتائج التقنية، حاول السؤال عن البرمجة ببايثون، تداول العملات، أو تطوير الألعاب.";

                for (const item of knowledge) {
                    if (item.keys.some(k => text.includes(k))) {
                        response = item.ans;
                        break;
                    }
                }

                chat.innerHTML += `
                    <div class="flex justify-end text-right">
                        <div class="bg-gray-800 border border-gray-700 p-3 rounded-2xl rounded-tr-none text-blue-100 max-w-[85%] shadow-xl">
                            ${response}
                        </div>
                    </div>`;
                chat.scrollTop = chat.scrollHeight;
            }, 600);
        }

        // دعم لوحة المفاتيح
        document.getElementById("user-input").addEventListener("keypress", (e) => { if (e.key === "Enter") askAI(); });
    </script>
</body>
</html>
