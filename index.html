<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI NEXUS | DIRECT SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f1f5f9; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .container { width: 95%; max-width: 800px; height: 90vh; background: var(--card); border-radius: 20px; display: flex; flex-direction: column; border: 1px solid #334155; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .header { padding: 20px; background: rgba(15, 23, 42, 0.5); border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        #status { font-size: 0.75rem; color: var(--accent); font-weight: 600; }
        #chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .msg { max-width: 85%; padding: 12px 18px; border-radius: 15px; line-height: 1.6; font-size: 0.95rem; white-space: pre-wrap; }
        .user { align-self: flex-end; background: var(--accent); color: #0f172a; font-weight: 600; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #334155; border-bottom-left-radius: 2px; }
        .input-box { padding: 20px; display: flex; gap: 12px; background: #0f172a; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        input { flex: 1; background: #1e293b; border: 1px solid #475569; padding: 14px; border-radius: 12px; color: white; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--accent); background: #26334d; }
        button { background: var(--accent); color: #0f172a; border: none; padding: 0 25px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:disabled { background: #475569; cursor: not-allowed; }
        button:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span>AI NEXUS DIRECT (Llama 3.2)</span>
        <span id="status">Loading Engine...</span>
    </div>
    <div id="chat">
        <div class="msg ai">Welcome. I am a real AI running 100% locally on your hardware. <b>The first time you send a message, I need to download my brain (approx 1GB). Please wait for the percentage to reach 100%.</b></div>
    </div>
    <div class="input-box">
        <input type="text" id="prompt" placeholder="Type a message..." autocomplete="off">
        <button id="sendBtn" disabled>WAITING...</button>
    </div>
</div>

<script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    const chatArea = document.getElementById('chat');
    const statusText = document.getElementById('status');
    const userInput = document.getElementById('prompt');
    const btn = document.getElementById('sendBtn');

   // To this (Tiny version):
const modelId = "SmolLM2-135M-Instruct-q4f16_1-MLC";
    let engine;

    async function initialize() {
        try {
            engine = new webllm.MLCEngine();
            engine.setInitProgressCallback((report) => {
                statusText.innerText = report.text;
                if (report.progress === 1) {
                    btn.disabled = false;
                    btn.innerText = "SEND";
                    statusText.innerText = "SYSTEM ONLINE";
                }
            });
            await engine.reload(modelId);
        } catch (err) {
            statusText.innerText = "GPU ERROR: Enable Hardware Acceleration";
            console.error(err);
        }
    }

    async function send() {
        const text = userInput.value.trim();
        if (!text || btn.disabled) return;

        appendMsg(text, 'user');
        userInput.value = '';
        
        const aiMsgDiv = appendMsg("Generating...", 'ai');
        
        try {
            const messages = [{ role: "user", content: text }];
            const chunks = await engine.chat.completions.create({ messages, stream: true });
            
            let reply = "";
            for await (const chunk of chunks) {
                reply += chunk.choices[0]?.delta?.content || "";
                aiMsgDiv.innerText = reply;
                chatArea.scrollTop = chatArea.scrollHeight;
            }
        } catch (e) {
            aiMsgDiv.innerText = "Critical System Error. Check browser console.";
        }
    }

    function appendMsg(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
        return div;
    }

    btn.onclick = send;
    userInput.onkeypress = (e) => { if(e.key === 'Enter') send(); };

    // Start loading immediately
    initialize();
</script>

</body>
</html>
