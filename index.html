<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI NEXUS | ULTIMATE FIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0f1a; --card: #161e2e; --accent: #0ea5e9; --text: #e2e8f0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { width: 95%; max-width: 700px; height: 80vh; background: var(--card); border-radius: 16px; display: flex; flex-direction: column; border: 1px solid #1e293b; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .header { padding: 15px 20px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; border-radius: 16px 16px 0 0; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 12px; font-size: 0.9rem; line-height: 1.4; }
        .user { align-self: flex-end; background: var(--accent); color: white; }
        .ai { align-self: flex-start; background: #334155; }
        .controls { padding: 15px; background: #0b0f1a; display: flex; flex-direction: column; gap: 10px; border-radius: 0 0 16px 16px; }
        .input-row { display: flex; gap: 8px; }
        input { flex: 1; background: #1e293b; border: 1px solid #334155; padding: 12px; border-radius: 8px; color: white; outline: none; }
        button { background: var(--accent); color: white; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #475569; }
        #progress-container { height: 4px; background: #334155; border-radius: 2px; overflow: hidden; display: none; }
        #progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }
        #status-label { font-size: 0.7rem; color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span>AI NEXUS V2 (Ultra-Light)</span>
        <span id="status-label">Initializing...</span>
    </div>
    <div id="chat">
        <div class="msg ai">Direct connection established. Click "SEND" to begin the one-time download (fast).</div>
    </div>
    <div class="controls">
        <div id="progress-container"><div id="progress-bar"></div></div>
        <div class="input-row">
            <input type="text" id="userInput" placeholder="Ask your AI..." autocomplete="off">
            <button id="btn">SEND</button>
        </div>
    </div>
</div>

<script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    const chatBox = document.getElementById('chat');
    const status = document.getElementById('status-label');
    const input = document.getElementById('userInput');
    const btn = document.getElementById('btn');
    const pBar = document.getElementById('progress-bar');
    const pContainer = document.getElementById('progress-container');

    // Super-Light model (Perfect for 8GB RAM and slow internet)
    const modelId = "Qwen2.5-0.5B-Instruct-q4f16_1-MLC";
    let engine;

    async function startAI() {
        const text = input.value.trim();
        if (!text) return;

        appendMsg(text, 'user');
        input.value = '';
        btn.disabled = true;
        pContainer.style.display = 'block';

        const aiBubble = appendMsg("Thinking...", 'ai');

        try {
            if (!engine) {
                status.innerText = "Connecting to AI Node...";
                engine = new webllm.MLCEngine();
                engine.setInitProgressCallback((report) => {
                    status.innerText = report.text;
                    const progress = Math.round(report.progress * 100);
                    pBar.style.width = progress + "%";
                });
                await engine.reload(modelId);
            }

            status.innerText = "System Online";
            pContainer.style.display = 'none';

            const messages = [{ role: "user", content: text }];
            const chunks = await engine.chat.completions.create({ messages, stream: true });
            
            let reply = "";
            for await (const chunk of chunks) {
                reply += chunk.choices[0]?.delta?.content || "";
                aiBubble.innerText = reply;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        } catch (e) {
            aiBubble.innerText = "Error: Browser blocked WebGPU. Enable 'Hardware Acceleration' in settings.";
            console.error(e);
        } finally {
            btn.disabled = false;
        }
    }

    function appendMsg(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
        return div;
    }

    btn.onclick = startAI;
    input.onkeypress = (e) => { if(e.key === 'Enter') startAI(); };
</script>

</body>
</html>
