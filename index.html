<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Nexus | Pro Edition</title>
    <!-- Professional Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* Professional CSS Styling */
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 95%;
            max-width: 800px;
            height: 85vh;
            background: var(--card);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            border: 1px solid #334155;
            overflow: hidden;
        }

        .header {
            padding: 20px;
            background: rgba(15, 23, 42, 0.5);
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 8px #22c55e;
        }

        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .user-msg {
            align-self: flex-end;
            background: var(--accent);
            color: #0f172a;
            font-weight: 500;
            border-bottom-right-radius: 2px;
        }

        .ai-msg {
            align-self: flex-start;
            background: #334155;
            color: var(--text-main);
            border-bottom-left-radius: 2px;
        }

        .input-area {
            padding: 20px;
            background: rgba(15, 23, 42, 0.3);
            display: flex;
            gap: 12px;
        }

        input {
            flex: 1;
            background: #0f172a;
            border: 1px solid #475569;
            padding: 14px;
            border-radius: 10px;
            color: white;
            outline: none;
            transition: border 0.3s;
        }

        input:focus { border-color: var(--accent); }

        button {
            background: var(--accent);
            color: #0f172a;
            border: none;
            padding: 0 24px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:active { transform: scale(0.95); }

        /* Custom Scrollbar */
        #chat-window::-webkit-scrollbar { width: 6px; }
        #chat-window::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="status-dot"></div>
            <span style="font-weight: 600; letter-spacing: 0.5px;">AI NEXUS SYSTEM</span>
        </div>

        <div id="chat-window">
            <div class="message ai-msg">System Online. How can I help you today?</div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type your command..." autocomplete="off">
            <button id="sendBtn">SEND</button>
        </div>
    </div>

    <!-- The AI "Engine" -->
    <script src="https://js.puter.com/v2/"></script>
    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        async function handleChat() {
            const text = userInput.value.trim();
            if (!text) return;

            // Add User Message
            addMessage(text, 'user-msg');
            userInput.value = '';

            // Add Thinking Placeholder
            const typingDiv = addMessage("Thinking...", 'ai-msg');

            try {
                // Calls Puter's free cloud AI (No API Key needed in code)
                const response = await puter.ai.chat(text);
                typingDiv.innerText = response;
            } catch (error) {
                typingDiv.innerText = "Error: Connection failed. Please try again.";
                typingDiv.style.color = "#ef4444";
            }

            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function addMessage(text, className) {
            const div = document.createElement('div');
            div.className = `message ${className}`;
            div.innerText = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return div;
        }

        sendBtn.addEventListener('click', handleChat);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleChat();
        });
    </script>
</body>
</html>
