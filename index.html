
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio | Typing Mode</title>
    <style>
        :root {
            --gemini-purple: #8e24aa;
            --google-gray: #3c4043;
            --light-gray: #70757a;
            --border: #dfe1e5;
            --bg-color: #f8f9fa;
        }

        body {
            font-family: 'Google Sans', Roboto, Arial, sans-serif;
            margin: 0;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Top Header */
        .header {
            width: 100%;
            max-width: 850px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand { display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .brand-icon { width: 20px; height: 20px; background: linear-gradient(45deg, #4285f4, #8e24aa); border-radius: 50%; }

        /* Chat Display Area */
        #chat-window {
            flex: 1;
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            overflow-y: auto;
            margin-bottom: 100px; /* Space for input bar */
        }

        .message {
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .user-label { color: var(--google-gray); font-weight: bold; margin-bottom: 5px; }
        .ai-label { color: var(--gemini-purple); font-weight: bold; margin-bottom: 5px; }

        /* Floating Input Bar */
        .input-container {
            position: fixed;
            bottom: 30px;
            width: 90%;
            max-width: 700px;
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 1px 6px rgba(32,33,36,0.1);
        }

        input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            padding: 10px;
            font-size: 1rem;
        }

        .action-btns { display: flex; gap: 10px; }
        
        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--light-gray);
            transition: 0.2s;
        }

        .icon-btn:hover { color: var(--gemini-purple); }

        /* PRINT STYLES */
        @media print {
            .input-container, .header, .icon-btn { display: none !important; }
            #chat-window { margin: 0; padding: 0; }
            body { background: white; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand">
            <div class="brand-icon"></div>
            <span>AI Studio</span>
        </div>
        <button class="icon-btn" onclick="window.print()" title="Print Conversation">🖨️</button>
    </div>

    <div id="chat-window">
        <div class="message">
            <div class="ai-label">AI Studio</div>
            <div id="ai-response">Hello! Type something below to begin, and click the printer icon above to print our conversation.</div>
        </div>
    </div>

    <div class="input-container">
        <input type="text" id="user-input" placeholder="Enter a prompt here..." onkeypress="handleEnter(event)">
        <div class="action-btns">
            <button class="icon-btn" onclick="processInput()">➤</button>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');

        function handleEnter(e) {
            if (e.key === 'Enter') processInput();
        }

        function processInput() {
            const text = userInput.value.trim();
            if (text === "") return;

            // 1. Add User Message
            const userDiv = document.createElement('div');
            userDiv.className = 'message';
            userDiv.innerHTML = `<div class="user-label">You</div><div>${text}</div>`;
            chatWindow.appendChild(userDiv);

            // 2. Clear Input
            userInput.value = "";

            // 3. Simulate AI Response (You can connect your Python API here)
            setTimeout(() => {
                const aiDiv = document.createElement('div');
                aiDiv.className = 'message';
                aiDiv.innerHTML = `<div class="ai-label">AI Studio</div><div>I have received your message: "${text}". How can I help you further?</div>`;
                chatWindow.appendChild(aiDiv);
                
                // Auto-scroll to bottom
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }, 600);
        }
    </script>

</body>
</html>
