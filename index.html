<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Hub | GitHub Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <header>
            <h1>AI Chat <span class="badge">No-API-Key</span></h1>
        </header>
        <div id="chat-window"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type a message...">
            <button onclick="askAI()">Send</button>
        </div>
    </div>

    <!-- This loads the AI logic -->
    <script type="module">
        import { HfInference } from 'https://cdn.jsdelivr.net/npm/@huggingface/inference@2.6.4/+esm';
        
        // Use a tiny model that is fast and free
        const hf = new HfInference("hf_xxxxxxxxxxxxxxxxx"); // Your Free Token

        window.askAI = async () => {
            const input = document.getElementById('userInput');
            const window = document.getElementById('chat-window');
            const text = input.value;

            window.innerHTML += `<div class="user-msg">${text}</div>`;
            input.value = '';

            const response = await hf.textGeneration({
                model: 'gpt2', // Or 'mistralai/Mistral-7B-v0.1'
                inputs: text,
            });

            window.innerHTML += `<div class="ai-msg">${response.generated_text}</div>`;
        };
    </script>
</body>
</html>
