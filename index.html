<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS | Global Web Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00f2ff;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Animated Background Gradient */
        .orb {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.15) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            filter: blur(80px);
            animation: pulse 8s infinite alternate;
        }

        @keyframes pulse {
            from { transform: translate(-50%, -50%) scale(1); }
            to { transform: translate(-50%, -50%) scale(1.3); opacity: 0.5; }
        }

        .main-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 60px 40px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .logo {
            font-size: 0.8rem;
            letter-spacing: 5px;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 20px;
            font-weight: 700;
        }

        h1 {
            font-size: 2.8rem;
            margin: 0 0 15px 0;
            font-weight: 300;
            letter-spacing: -1px;
        }

        p {
            color: #888;
            line-height: 1.6;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .btn-portal {
            background: white;
            color: black;
            border: none;
            padding: 20px 45px;
            border-radius: 100px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        .btn-portal:hover {
            transform: scale(1.02);
            background: var(--accent);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.4);
        }

        .btn-portal:active { transform: scale(0.98); }

        .loading-bar {
            width: 0%;
            height: 2px;
            background: var(--accent);
            position: absolute;
            bottom: 0;
            left: 0;
            transition: width 1.5s ease-in-out;
        }

        .status-msg {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="orb"></div>

    <div class="main-card">
        <div class="logo">System.Nexus</div>
        <h1>Explore the Void</h1>
        <p>A specialized gateway designed to bridge your connection to randomized global archives.</p>
        
        <button class="btn-portal" onclick="triggerJump()">
            INITIALIZE JUMP
            <div id="bar" class="loading-bar"></div>
        </button>

        <div id="status" class="status-msg">Awaiting Input...</div>
    </div>

    <script>
        function triggerJump() {
            const bar = document.getElementById('bar');
            const status = document.getElementById('status');
            const gateways = [
                "https://theuselessweb.com/",
                "https://random-ize.com/random-website/",
                "https://discuvver.com/",
                "https://www.randomwebsite.com/"
            ];

            // UI Feedback
            bar.style.width = "100%";
            status.innerText = "Synchronizing Data Streams...";
            status.style.color = "var(--accent)";

            setTimeout(() => {
                const destination = gateways[Math.floor(Math.random() * gateways.length)];
                window.location.href = destination;
            }, 1600);
        }
    </script>
</body>
</html>
